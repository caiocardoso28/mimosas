<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workday Custom UI</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background: #f5f5f5;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,.1);
            max-width: 700px;
        }

        button {
            padding: 10px 18px;
            font-size: 16px;
            cursor: pointer;
        }

        #status {
            margin-top: 15px;
            color: #666;
        }

        #result {
            margin-top: 25px;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Workday Custom UI Shell</h2>

    <p>
        This page receives a Workday OAuth token and can call secured orchestrations.
    </p>

    <button onclick="callOrchestration()">
        Load Application
    </button>

    <div id="status">
        Checking authentication...
    </div>

    <div id="result"></div>

</div>

<script>

//////////////////////////////////////////////////////
// Read OAuth token from URL fragment
//////////////////////////////////////////////////////

const hash = window.location.hash.substring(1);

const params = new URLSearchParams(hash);

const accessToken = params.get("access_token");

const tokenType = params.get("token_type");

if (accessToken) {

    document.getElementById("status").innerHTML =
        "✅ Authenticated with Workday";


}
else {

    document.getElementById("status").innerHTML =
        "❌ No access token found.";

}

//////////////////////////////////////////////////////
// Call orchestration
//////////////////////////////////////////////////////

async function callOrchestration() {

    if (!accessToken) {
        alert("No Workday access token available.");
        return;
    }

    try {

        const response = await fetch(
            "https://api.us.wcp.workday.com/orchestrate/v1/apps/customuitest_nykbdn/orchestrations/returnHTML/launch",
            {
                method: "GET",

                headers: {
                    "Authorization": "Bearer " + accessToken,
                    "Accept": "text/html"
                }
            }
        );

        if (!response.ok) {
            throw new Error(
                "HTTP " + response.status
            );
        }

        const html = await response.text();

        //////////////////////////////////////////////////////
        // Replace page with HTML returned by orchestration
        //////////////////////////////////////////////////////

        document.open();
        document.write(html);
        document.close();

    }
    catch (error) {

        console.error(error);

        document.getElementById("result").innerHTML =
            "<h3>Error</h3><pre>" + error + "</pre>";

    }

}

</script>

</body>
</html>
